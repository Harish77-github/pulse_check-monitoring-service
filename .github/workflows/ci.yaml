name: PulseCheck CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t pulsecheck .

      - name: Tag Docker image
        run: |
          docker tag pulsecheck:latest 483162586756.dkr.ecr.ap-south-1.amazonaws.com/pulsecheck:latest

      - name: Push Docker image to Amazon ECR
        run: |
          docker push 483162586756.dkr.ecr.ap-south-1.amazonaws.com/pulsecheck:latest

      - name: Simulated deployment step
        run: |
          echo "Deployment simulation successful"